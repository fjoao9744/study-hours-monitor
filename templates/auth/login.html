
{{ error }}

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Entrar novamente</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-gray-800 p-8 rounded-xl shadow">

    <!-- Título -->
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold">Entrar</h2>
      <p class="text-gray-400">Bem vindo de volta :)</p>
    </div>

    <!-- Form -->
    <form method="POST" class="space-y-6">
      {% csrf_token %}

      <!-- Username -->
      <div>
        <label class="block mb-2 text-gray-400">Usuário</label>
        <input 
          type="text" 
          name="username"
          placeholder="Seu nome de usuário"
          class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500"
        >
      </div>

      <!-- Senha -->
      <div>
        <label class="block mb-2 text-gray-400">Senha</label>
        <input 
          type="password" 
          name="password"
          placeholder="••••••••"
          class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500"
        >
      </div>

      <!-- Botão -->
      <button 
        type="submit"
        class="w-full bg-blue-500 hover:bg-blue-600 py-3 rounded-lg font-semibold"
      >
        Entrar novamente
      </button>

      <!-- Link login -->
      <p class="text-center text-gray-400 text-sm">
        Ainda não possui uma conta?
        <a href="{% url 'register' %}" class="text-blue-400 hover:underline">Cadastrar</a>
      </p>

    </form>

  </div>

</body>
</html>
