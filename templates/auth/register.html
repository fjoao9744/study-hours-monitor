{{ error }}

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Criar Conta</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-gray-800 p-8 rounded-xl shadow">

    <!-- Título -->
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold">Criar Conta</h2>
      <p class="text-gray-400">Comece a registrar suas horas</p>
    </div>

    <!-- Form -->
    <form method="POST" class="space-y-6">
      {% csrf_token %}

      <!-- Username -->
      <div>
        <label class="block mb-2 text-gray-400">Usuário</label>
        <input 
          type="text" 
          name="username"
          placeholder="Seu nome de usuário"
          class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500"
        >
      </div>

      <!-- Email -->
      <div>
        <label class="block mb-2 text-gray-400">Email</label>
        <input 
          type="email" 
          name="email"
          placeholder="seu@email.com"
          class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500"
        >
      </div>

      <!-- Senha -->
      <div>
        <label class="block mb-2 text-gray-400">Senha</label>
        <input 
          type="password" 
          name="password"
          placeholder="••••••••"
          class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500"
          id="password"
        >

      </div>

      <!-- Confirmar senha -->
      <div>
        <label class="block mb-2 text-gray-400">Confirmar senha</label>
        <input 
          type="password" 
          name="confirm_password"
          placeholder="••••••••"
          class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500"
          id="confirm_password"
        >
      </div>
      <label>
        <input type="checkbox" id="show_password">
        Exibir senha
      </label>

      <!-- Botão -->
      <button 
        type="submit"
        class="w-full bg-blue-500 hover:bg-blue-600 py-3 rounded-lg font-semibold"
      >
        Criar Conta
      </button>

      <!-- Link login -->
      <p class="text-center text-gray-400 text-sm">
        Já tem conta?
        <a href="{% url 'login' %}" class="text-blue-400 hover:underline">Entrar</a>
      </p>

    </form>

  </div>

  <script>
    let password = document.getElementById("password")
    let confirm_password = document.getElementById("confirm_password")
      let checkbox = document.getElementById("show_password")
    document.getElementById("show_password").addEventListener("change", function() {
    if (checkbox.checked) {
        password.type = "text";
        confirm_password.type = "text";
    } else {
        password.type = "password";
        confirm_password.type = "password";
    }
  })
  </script>

</body>
</html>
