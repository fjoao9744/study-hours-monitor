<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Registrar Horas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<!--==================================== OUTDATED DATA!!! ==================================== -->

<body class="bg-gray-900 text-white">

  <!-- modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">

  <div class="bg-gray-800 p-6 rounded-xl w-full max-w-md shadow-lg">
    <h3 class="text-xl font-bold mb-4">Gerenciar Tópicos</h3>

    <form method="POST">
      {% csrf_token %}

      <!-- Lista de tópicos -->
      <div class="bg-gray-900 border border-gray-700 rounded-lg divide-y divide-gray-700 mb-4">
  
        {% for topic in topics %}
        <label class="block p-3 hover:bg-gray-800 cursor-pointer">
          <input type="radio" name="topic" value="{{ topic.id }}" class="hidden peer">
          <span class="peer-checked:text-blue-400 peer-checked:font-semibold">
            {{ topic.name }}
          </span>
        </label>
        {% endfor %}

      </div>

      <!-- Input para adicionar -->
      <input 
        type="text" 
        name="new_topic"
        placeholder="Novo tópico"
        class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 mb-4 focus:outline-none focus:border-blue-500"
      >
      <!-- Cor -->
        <div>
          <label class="block mb-2 text-gray-400">Cor (opcional)</label>
          <input type="color" name="color">
        </div>

      <!-- Botões -->
      <div class="flex justify-end gap-3">
        
        <button type="button" onclick="closeModal()" class="text-gray-400 hover:text-white">
          Cancelar
        </button>

        <!-- ADICIONAR -->
        <button 
          type="submit"
          class="bg-green-500 px-4 py-2 rounded-lg"
        >
          Adicionar
        </button>

        <!-- REMOVER -->
        <button 
          type="submit"
          class="bg-red-500 px-4 py-2 rounded-lg"
        >
          Remover
        </button>

      </div>
    </form>

  </div>

</div>

  <!-- Navbar -->
  <header class="bg-gray-800 shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-400"><a href="{% url 'homepage' %}">⏱ Horas Contadas</a></h1>
      <nav class="space-x-6">
        <a href="{% url 'dashboard' %}" class="hover:text-blue-400">Dashboard</a>
        <a href="{% url 'logout' %}" class="hover:text-red-400">Sair</a>
      </nav>
    </div>
  </header>

  <!-- Container -->
  <main class="max-w-3xl mx-auto px-6 py-12">

    <!-- Título -->
    <div class="mb-8 text-center">
      <h2 class="text-3xl font-bold">Registrar Horas</h2>
      <p class="text-gray-400">Adicione rapidamente seu tempo de estudo</p>
    </div>

    <!-- Card Form -->
    <div class="bg-gray-800 p-8 rounded-xl shadow">

      <form method="POST" class="space-y-6">
        {% csrf_token %}

        <!-- Topico -->
        <div>
          <label class="block mb-2 text-gray-400">Topico</label> <button type="button" onclick="openModal()" class="text-blue-400 ml-2">Gerenciar Tópicos</button>
          <select name="topic" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500">
            {% for topic in topics%}
            
            <option>{{ topic.name }}</option>

            {% endfor %}
          </select>
        </div>

        <!-- Horas -->
        <div>
          <label class="block mb-2 text-gray-400">Horas estudadas</label>
          <input 
            type="number" 
            step="0.1"
            name="hours"
            placeholder="Ex: 2.5"
            class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500"
          >
        </div>

        <!-- comentary -->
        <div>
          <label class="block mb-2 text-gray-400">Comentario (opcional)</label>
          <input type="text" name="comentary">
        </div>

        <!-- Botões -->
        <div class="flex justify-between items-center pt-4">
          <a href="{% url 'registers' %}" class="text-gray-400 hover:text-white">
            ← Voltar
          </a>

          <button 
            type="submit"
            class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-lg font-semibold"
          >
            Salvar Registro
          </button>
        </div>

      </form>
    </div>


    <script>
    function openModal() {
      const modal = document.getElementById("modal");
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function closeModal() {
      const modal = document.getElementById("modal");
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }
    </script>
  </main>

</body>
</html>
